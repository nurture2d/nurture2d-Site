<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download — Nurture2D</title>
  <link rel="icon" href="assets/pencil2d.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="download.css" />
</head>
<body>

  <header class="nav-bar scrolled" id="navbar">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <img src="assets/LogoName.png" alt="Nurture2D" class="nav-logo" />
      </a>
      <nav class="nav-links">
        <a href="index.html#features">Features</a>
        <a href="index.html#showcase">Showcase</a>
        <a href="index.html#notice">Notice</a>
        <a href="index.html#contact">Contact</a>
        <a href="download.html" class="nav-cta">Download</a>
      </nav>
      <button class="nav-hamburger" aria-label="Menu" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="dl-main">

    <!-- DARK HERO: title + type selector -->
    <section class="dl-hero">
      <div class="hero-bg">
        <div class="hero-orb orb-1"></div>
        <div class="hero-orb orb-2"></div>
        <div class="hero-grid"></div>
      </div>
      <div class="dl-hero-content">
        <div class="hero-badge reveal">Free Download</div>
        <h1 class="hero-title reveal">Get <span class="gradient-text">Nurture2D</span></h1>
        <p class="hero-sub reveal">No account required. Available for Windows and Linux.</p>

        <!-- TYPE SELECTOR -->
        <div class="segment reveal" id="seg-type">
          <button class="seg-btn active" data-type="app">Application</button>
          <button class="seg-btn" data-type="source">Source Code</button>
        </div>
      </div>
    </section>

    <!-- LIGHT SECTION: version strip + download buttons -->
    <section class="dl-light">
      <div class="dl-light-inner">

        <!-- VERSION STRIP -->
        <div class="version-strip-wrap">
          <div class="version-strip" id="seg-version">
            <button class="ver-btn" data-version="2025.5">
              <span class="ver-num">2025.5</span>
            </button>
            <button class="ver-btn active" data-version="2025.8">
              <span class="ver-num">2025.8</span>
              <span class="ver-sub">Latest</span>
            </button>
            <button class="ver-btn soon" data-version="2026" disabled>
              <span class="ver-num">2026</span>
              <span class="ver-sub">Coming Soon</span>
            </button>
          </div>
        </div>

        <!-- DOWNLOAD BUTTONS -->
        <div class="dl-buttons" id="dl-buttons">
          <!-- populated by JS -->
        </div>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="assets/LogoName.png" alt="Nurture2D" class="footer-logo" />
      </div>
      <div class="footer-links">
        <a href="index.html#features">Features</a>
        <a href="index.html#notice">Notice</a>
        <a href="index.html#contact">Contact</a>
        <a href="download.html">Download</a>
      </div>
      <div class="footer-copy">© <span id="year"></span> Nurture2D. All rights reserved.</div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    const BASE = "https://github.com/nurture2d/nurture2d-Site/releases/latest/download/";

    const downloads = {
      app: {
        "2025.5": [
          { name: "Windows 64-bit", meta: "ZIP",         file: "Nurture2D-64bit-v6.0.4.zip",        platform: "win" },
          { name: "Windows 32-bit", meta: "ZIP",         file: "Nurture2D-32bit-v6.0.4.zip",        platform: "win" },
          { name: "Linux x86_64",   meta: "AppImage",    file: "Nurture2D-x86_64-v6.0.4.AppImage",  platform: "linux" },
        ],
        "2025.8": [
          { name: "Windows 64-bit", meta: "ZIP · 2025.8",    file: "Nurture2D-64bit.2025.8.zip",        platform: "win" },
          { name: "Windows 32-bit", meta: "ZIP · 2025.8",    file: "Nurture2D-32bit.2025.8.zip",        platform: "win" },
          { name: "Linux x86_64",   meta: "AppImage · 2025.8", file: "Nurture2D-x86_64.AppImage",        platform: "linux" },
        ],
      },
      source: {
        "2025.5": [
          { name: "Source Code",    meta: "ZIP",         file: "Nurture2D-SourceCode-v6.0.4.zip",   platform: "code" },
          { name: "View on GitHub", meta: "Repository", url: "https://github.com/nurture2d/nurture2d-Site", platform: "gh", external: true },
        ],
        "2025.8": [
          { name: "Source Code",  meta: "ZIP · 2025.8", file: "Nurture2D-SourceCode.2025.8.zip",   platform: "code" },
          { name: "View on GitHub", meta: "Repository", url: "https://github.com/nurture2d/nurture2d-Site", platform: "gh", external: true },
        ],
      },
    };

    const icons = {
      win:   `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>`,
      linux: `<span style="font-size:20px;line-height:1">🐧</span>`,
      code:  `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
      gh:    `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>`,
    };

    let currentType    = "app";
    let currentVersion = "2025.8";

    function render() {
      const container = document.getElementById("dl-buttons");
      const list = (downloads[currentType] || {})[currentVersion];

      if (!list) {
        container.innerHTML = `
          <div class="dl-soon-state">
            <div class="soon-emoji">🚀</div>
            <h3>Version 2026 — Coming Soon</h3>
            <p>Currently in development. Watch the repository for updates.</p>
            <a href="https://github.com/nurture2d/nurture2d-Site" target="_blank" rel="noopener" class="btn btn-ghost" style="margin-top:20px">Watch on GitHub</a>
          </div>`;
        return;
      }

      container.innerHTML = list.map(item => {
        const href  = item.url || (BASE + item.file);
        const attrs = item.external
          ? `href="${href}" target="_blank" rel="noopener"`
          : `href="${href}" download`;
        const arrow = item.external
          ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`
          : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v13M5 14l7 7 7-7"/></svg>`;
        return `
          <a class="dl-btn" ${attrs}>
            <div class="dl-btn-icon ${item.platform}">${icons[item.platform]}</div>
            <div class="dl-btn-text">
              <span class="dl-btn-name">${item.name}</span>
              <span class="dl-btn-meta">${item.meta}</span>
            </div>
            <div class="dl-btn-arrow">${arrow}</div>
          </a>`;
      }).join("");
    }

    document.getElementById("seg-type").addEventListener("click", e => {
      const btn = e.target.closest(".seg-btn");
      if (!btn || btn.disabled) return;
      document.querySelectorAll("#seg-type .seg-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentType = btn.dataset.type;
      render();
    });

    document.getElementById("seg-version").addEventListener("click", e => {
      const btn = e.target.closest(".ver-btn");
      if (!btn || btn.disabled) return;
      document.querySelectorAll("#seg-version .ver-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentVersion = btn.dataset.version;
      render();
    });

    render();
  </script>
</body>
</html>
